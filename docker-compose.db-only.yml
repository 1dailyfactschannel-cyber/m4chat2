# ==========================================
# M4Chat - Full Stack with Database
# ==========================================
# Stack name: m4chat
# Полный стек: База данных + API + Frontend
#
# Порты:
# - 5446: PostgreSQL (внешний доступ)
# - 8081: Web интерфейс (Nginx)
# - 8080: API (внутренний, через Nginx)

services:
  # ==========================================
  # 1. PostgreSQL Database
  # ==========================================
  db:
    image: postgres:15-alpine
    container_name: m4chat-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: XYL9zWCqwjACdnm
      POSTGRES_DB: m4chat_pg
    ports:
      - "5446:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d m4chat_pg"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - m4chat-network

  # ==========================================
  # 2. API Backend (Node.js)
  # ==========================================
  api:
    build:
      context: https://github.com/1dailyfactschannel-cyber/m4chat2.git#main
      target: api
    container_name: m4chat-api
    restart: unless-stopped
    environment:
      # Подключение к БД внутри Docker сети (db - имя сервиса)
      DATABASE_URL: postgresql://postgres:XYL9zWCqwjACdnm@db:5432/m4chat_pg
      PORT: 8080
      NODE_ENV: production
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy
    # Healthcheck отключен временно для отладки
    # Чтобы включить, раскомментируйте:
    # healthcheck:
    #   test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 5
    #   start_period: 60s
    networks:
      - m4chat-network

  # ==========================================
  # 3. Frontend (Nginx)
  # ==========================================
  web:
    build:
      context: https://github.com/1dailyfactschannel-cyber/m4chat2.git#main
      target: web
    container_name: m4chat-web
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - api
    networks:
      - m4chat-network

# ==========================================
# Volumes & Networks
# ==========================================
volumes:
  postgres_data:
    driver: local

networks:
  m4chat-network:
    driver: bridge
