# ==========================================
# PostgreSQL Database Only Deployment
# ==========================================
# Stack name: m4chat
# Use this in Portainer web editor

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: m4chat
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: XYL9zWCqwjACdnm
      POSTGRES_DB: m4chat_pg
    ports:
      - "5445:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d m4chat_pg"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
