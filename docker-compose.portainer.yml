# ==========================================
# M4Chat2 - Complete Stack for Portainer Repository Method
# ==========================================
#
# Для деплоя через Portainer Repository:
# 1. Создай стек в Portainer с методом "Repository"
# 2. URL: https://github.com/1dailyfactschannel-cyber/m4chat2.git
# 3. Compose path: docker-compose.portainer.yml
# 4. Ветка: main
#
# Environment Variables (добавь в Portainer при создании стека):
# - POSTGRES_PASSWORD (обязательно): пароль для базы данных
# - DATABASE_URL (обязательно): полный URL подключения к БД
# - Опционально: POSTGRES_USER, POSTGRES_DB, DB_PORT, WEB_PORT, API_PORT, NODE_ENV
#
# Этот файл создаёт НОВЫЙ стек с новой базой данных

services:
  # ==========================================
  # 1. PostgreSQL Database
  # ==========================================
  db:
    image: postgres:15-alpine
    container_name: m4chat2-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-XYL9zWCqwjACdnm}
      POSTGRES_DB: ${POSTGRES_DB:-m4chat2_db}
    ports:
      - "${DB_PORT:-5446}:5432"
    volumes:
      - m4chat2_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-m4chat2_db}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - m4chat2-network

  # ==========================================
  # 2. API Backend
  # ==========================================
  api:
    build:
      context: .
      target: api
    container_name: m4chat2-api
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:XYL9zWCqwjACdnm@db:5432/m4chat2_db}
      PORT: ${API_PORT:-8080}
      NODE_ENV: ${NODE_ENV:-production}
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - m4chat2-network

  # ==========================================
  # 3. Frontend Web
  # ==========================================
  web:
    build:
      context: .
      target: web
    container_name: m4chat2-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-81}:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - m4chat2-network

volumes:
  m4chat2_data:
    driver: local

networks:
  m4chat2-network:
    driver: bridge
