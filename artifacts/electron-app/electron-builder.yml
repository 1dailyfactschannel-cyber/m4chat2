appId: com.workspace.app
productName: MyApp
copyright: Copyright © 2026

directories:
  output: release
  buildResources: build-resources

files:
  - dist/**/*
  - node_modules/**/*
  - package.json

extraResources:
  - from: ../api-server/dist
    to: api-server/dist
    filter:
      - "**/*"
  - from: ../mockup-sandbox/dist
    to: frontend/dist
    filter:
      - "**/*"

mac:
  category: public.app-category.productivity
  target:
    - dmg
    - zip

win:
  target:
    - nsis
  icon: build-resources/icon.ico

linux:
  target:
    - AppImage
  category: Utility
