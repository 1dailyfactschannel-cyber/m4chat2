# ==========================================
# M4Chat - Repository Method Docker Compose
# ==========================================
#
# ДЛЯ ДЕПЛОЯ ЧЕРЕЗ PORTAINER REPOSITORY:
#
# 1. Portainer → Stacks → Add stack
# 2. Method: Repository
# 3. Repository URL: https://github.com/1dailyfactschannel-cyber/m4chat2.git
# 4. Repository reference: refs/heads/main
# 5. Compose path: docker-compose.yml
# 6. Automatic updates: Enable (опционально)
# 7. Webhook: Enable (для авто-обновления при push)
#
# Порты:
# - 5446: PostgreSQL (внешний доступ)
# - 8083: API (напрямую)
# - 8082: Web интерфейс (Nginx с прокси)

services:
  # ==========================================
  # 1. PostgreSQL Database
  # ==========================================
  db:
    image: postgres:15-alpine
    container_name: m4chat-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: XYL9zWCqwjACdnm
      POSTGRES_DB: m4chat_pg
    ports:
      - "5446:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d m4chat_pg"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - m4chat-network

  # ==========================================
  # 2. API Backend (сборка из локального кода репозитория)
  # ==========================================
  api:
    build:
      context: .
      target: api
      dockerfile: Dockerfile
    container_name: m4chat-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:XYL9zWCqwjACdnm@db:5432/m4chat_pg
      PORT: 8080
      NODE_ENV: production
      ADMIN_TOKEN: m4chat-secret-admin-token-2024
    ports:
      - "8083:8080"
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - m4chat-network

  # ==========================================
  # 3. Frontend Web (nginx с проксированием)
  # ==========================================
  web:
    image: nginx:alpine
    container_name: m4chat-web
    restart: unless-stopped
    ports:
      - "8082:80"
    depends_on:
      - api
    networks:
      - m4chat-network
    command: >
      sh -c "
        echo 'server {
          listen 80;
          server_name localhost;
          
          location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            try_files \$$uri \$$uri/ /index.html;
          }
          
          location /api/ {
            proxy_pass http://api:8080/api/;
            proxy_http_version 1.1;
            proxy_set_header Host \$$host;
            proxy_set_header X-Real-IP \$$remote_addr;
          }
          
          location /admin/ {
            proxy_pass http://api:8080/admin/;
            proxy_http_version 1.1;
            proxy_set_header Host \$$host;
            proxy_set_header X-Real-IP \$$remote_addr;
          }
          
          location /health {
            proxy_pass http://api:8080/health;
          }
        }' > /etc/nginx/conf.d/default.conf &&
        nginx -g 'daemon off;'
      "

volumes:
  postgres_data:
    driver: local

networks:
  m4chat-network:
    driver: bridge
